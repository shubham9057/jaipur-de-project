<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Content Published</title>
</head>
<body style="margin:0;padding:0;background-color:#F0F4F8;font-family:'Segoe UI',Helvetica,Arial,sans-serif;">

  <!-- Outer wrapper -->
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
         style="background-color:#F0F4F8;padding:40px 16px;">
    <tr>
      <td align="center">

        <!-- Card -->
        <table role="presentation" width="600" cellpadding="0" cellspacing="0"
               style="max-width:600px;width:100%;background:#FFFFFF;border-radius:12px;
                      overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.08);">

          <!-- ── Header banner ── -->
          <tr>
            <td style="background:linear-gradient(135deg,#1E3A5F 0%,#2563EB 100%);
                       padding:36px 40px 28px;">
              <p style="margin:0 0 8px;font-size:11px;font-weight:700;letter-spacing:2px;
                        color:#93C5FD;text-transform:uppercase;">Alexandria - Data Engineering Knowledge Base</p>
              <h1 style="margin:0;font-size:26px;font-weight:700;color:#FFFFFF;line-height:1.3;">
                New Content Published 🚀
              </h1>
              <p style="margin:10px 0 0;font-size:14px;color:#BFDBFE;">
                ${WEEK_DATE}
              </p>
            </td>
          </tr>

          <!-- ── Body ── -->
          <tr>
            <td style="padding:36px 40px 0;">

              <!-- What's New — one block per article -->
              <h2 style="margin:0 0 20px;font-size:13px;font-weight:700;letter-spacing:1.5px;
                         color:#6B7280;text-transform:uppercase;">What's New</h2>

              ${ARTICLES_HTML}

            </td>
          </tr>

          <!-- ── Footer ── -->
          <tr>
            <td style="background:#1E3A5F;padding:24px 40px;border-radius:0 0 12px 12px;
                       margin-top:36px;">
              <p style="margin:0;font-size:12px;color:#93C5FD;text-align:center;">
                You received this email because you are part of Data Engineering Team.
              </p>
              <p style="margin:8px 0 0;font-size:11px;color:#6B7280;text-align:center;">
                &copy; Alexandria - Data Engineering Knowledge Base
              </p>
            </td>
          </tr>

        </table>
        <!-- /Card -->

      </td>
    </tr>
  </table>
  <!-- /Outer wrapper -->

</body>
</html>
