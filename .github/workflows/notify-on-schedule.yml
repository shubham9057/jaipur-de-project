name: Weekly Content Digest

on:
  schedule:
    - cron: '33 10 * * 1'    # Every Monday at 11:30 UTC, changed for testing
  workflow_dispatch:         # Allow manual trigger for testing

jobs:
  notify:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Needed to push the tracking tag after sending

    steps:
      # ── 1. Checkout full history ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Full history needed to read and compare tags

      # ── 2. Find new content since last notification ────────────────────────
      #
      #  Uses a lightweight git tag "last-email-notification" as a bookmark.
      #  - If the tag exists  → diff from that tag to HEAD
      #  - If no tag yet      → look back 7 days (first ever run)
      #  Exits early (no email sent) if no .md files changed.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Find new content since last notification
        id: changed
        run: |
          # ── Step 2a: explicitly fetch all tags ─────────────────────────────
          echo "--- Fetching all tags ---"
          git fetch --tags --force
          echo "Tags available:"
          git tag -l
 
          # ── Step 2b: resolve HEAD SHA ───────────────────────────────────────
          HEAD_SHA=$(git rev-parse HEAD)
          echo "HEAD SHA: $HEAD_SHA"
 
          # ── Step 2c: determine the diff BASE ───────────────────────────────
          if git rev-parse "refs/tags/last-email-notification" >/dev/null 2>&1; then
            BASE=$(git rev-parse "refs/tags/last-email-notification")
            SINCE_LABEL="last-email-notification tag"
            echo "Found tag at: $BASE"
          else
            echo "No tag found — this is the first run. Falling back to 7 days ago."
            # Get the SHA of the oldest commit within the last 7 days
            BASE=$(git log main --since="7 days ago" --format="%H" | tail -1)
 
            if [ -z "$BASE" ]; then
              echo "No commits found in the last 7 days."
              echo "Falling back to the very first commit in the repo."
              BASE=$(git rev-list --max-parents=0 HEAD)
            fi
            SINCE_LABEL="7 days ago fallback"
          fi
 
          echo "BASE SHA : $BASE"
          echo "HEAD SHA : $HEAD_SHA"
          echo "Diff range: $BASE → $HEAD_SHA"
 
          # ── Step 2d: guard — nothing to diff if BASE equals HEAD ───────────
          if [ "$BASE" = "$HEAD_SHA" ]; then
            echo "BASE and HEAD are the same commit — no new content. Skipping email."
            echo "has_content=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
 
          # ── Step 2e: find newly added .md files in BASE..HEAD ──────────────
          echo "--- Raw git log output (before filter) ---"
          git log --diff-filter=A --name-only --pretty=format: "$BASE..$HEAD_SHA" \
            | grep -v '^$' || true
          echo "-------------------------------------------"
 
          FILES=$(git log --diff-filter=A --name-only --pretty=format: \
                    "$BASE..$HEAD_SHA" \
                  | grep -E '^alexandria/.*\.md$' \
                  | sort -u \
                  | head -20)
 
          echo "--- Filtered newly added .md files ---"
          echo "${FILES:-  (none found)}"
          echo "--------------------------------------"
 
          echo "--- Changed content files ---"
          echo "${FILES:-  (none found)}"
          echo "-----------------------------"
 
          if [ -z "$FILES" ]; then
            echo "No new content files found since $SINCE_LABEL. Skipping email."
            echo "has_content=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
 
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"
          echo "has_content=true" >> "$GITHUB_OUTPUT"
 
          # ── Step 2f: build JSON array [{file, content}, ...] for Gemini ────
          JSON_ARRAY="["
          FIRST=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            CONTENT=$(head -c 3000 "$f" | jq -Rs .)
            FILE_JSON=$(jq -n --arg f "$f" --argjson c "$CONTENT" '{file: $f, content: $c}')
            if [ "$FIRST" = true ]; then
              JSON_ARRAY+="$FILE_JSON"
              FIRST=false
            else
              JSON_ARRAY+=",$FILE_JSON"
            fi
          done <<< "$FILES"
          JSON_ARRAY+="]"
 
          echo "$JSON_ARRAY" > /tmp/pr_files.json
          echo "JSON payload written to /tmp/pr_files.json"

      # ── 3. Generate per-file title + summary via Gemini 2.5 Flash ──────────
      #  Skipped automatically if has_content is false.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Generate per-file summaries via Gemini 2.5 Flash
        id: summary
        if: steps.changed.outputs.has_content == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBSITE_URL:    ${{ vars.WEBSITE_URL }}
        run: |
          FILES_JSON=$(cat /tmp/pr_files.json)

          PROMPT=$(jq -n \
            --argjson files "$FILES_JSON" \
            --arg url "$WEBSITE_URL" \
            '"You are a technical writer for Alexandria, a data engineering knowledge base.\n\nFor each file below, extract the KB article title from the content (use the first H1 heading or the most prominent title — NOT the filename) and write a 2-3 sentence summary explaining what the KB article covers and why it is useful for data engineers.\n\nReturn ONLY a valid JSON array — no markdown, no code fences, no extra text:\n[\n  {\n    \"file\": \"<original file path>\",\n    \"title\": \"<article title from content>\",\n    \"summary\": \"<2-3 sentence summary>\"\n  }\n]\n\nFiles:\n" + ($files | tostring)')

          PAYLOAD=$(jq -n \
            --argjson prompt "$PROMPT" \
            '{
              contents: [{
                parts: [{ text: $prompt }]
              }],
              generationConfig: {
                temperature: 0.2,
                maxOutputTokens: 8192,
                responseMimeType: "application/json",
                thinkingConfig: {
                  thinkingBudget: 0
                }
                }
            }')

          RESPONSE=$(curl -s \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "=== Gemini API raw response ==="
          echo "$RESPONSE" | jq .
          echo "==============================="

          API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$API_ERROR" ]; then
            echo "ERROR: Gemini API returned an error: $API_ERROR"
            echo "[]" > /tmp/summaries.json
          else
            RAW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "[]"')
            CLEAN=$(echo "$RAW" \
              | sed 's/^```json[[:space:]]*//' \
              | sed 's/^```[[:space:]]*//' \
              | sed 's/[[:space:]]*```$//')

            if echo "$CLEAN" | jq . > /tmp/summaries.json 2>/dev/null; then
              echo "Successfully parsed $(jq 'length' /tmp/summaries.json) article(s)."
            else
              echo "WARNING: Model response was not valid JSON. Raw output:"
              echo "$CLEAN"
              echo "[]" > /tmp/summaries.json
            fi
          fi

      # ── 4. Build ARTICLES_HTML and render the email template ───────────────
      - name: Render email from template
        id: render
        if: steps.changed.outputs.has_content == 'true'
        env:
          WEBSITE_URL: ${{ vars.WEBSITE_URL }}
        run: |
          WEEK_DATE=$(date "+%B %d, %Y")

          # Output date so Step 5 can use them in the subject line
          echo "week_date=$WEEK_DATE"    >> "$GITHUB_OUTPUT"

          derive_url() {
            local filepath="$1"
            local base_url="${WEBSITE_URL%/}"
            local page
            page=$(echo "$filepath" \
              | cut -d'/' -f2- \
              | sed 's|\.[^.]*$||')
            echo "${base_url}/${page}.html"
          }

          ARTICLES_HTML=""
          COUNT=$(jq 'length' /tmp/summaries.json)

          if [ "$COUNT" -eq 0 ]; then
            ARTICLES_HTML='<p style="font-size:15px;line-height:1.75;color:#374151;">
              New content has been published to the knowledge base.
              Visit the website to see what is new.
            </p>'
          else
            for i in $(seq 0 $(( COUNT - 1 )) ); do
              FILE=$(jq -r  ".[$i].file"    /tmp/summaries.json)
              TITLE=$(jq -r ".[$i].title"   /tmp/summaries.json)
              SUMM=$(jq -r  ".[$i].summary" /tmp/summaries.json)
              PAGE_URL=$(derive_url "$FILE")

              if [ "$i" -gt 0 ]; then
                ARTICLES_HTML+='<hr style="border:none;border-top:1px solid #E5E7EB;margin:0 0 24px;"/>'
              fi

              ARTICLES_HTML+="
              <div style=\"margin-bottom:28px;\">
                <h3 style=\"margin:0 0 10px;font-size:17px;font-weight:700;color:#1E3A5F;
                            line-height:1.4;\">
                  ${TITLE}
                </h3>
                <p style=\"margin:0 0 14px;font-size:15px;line-height:1.75;color:#374151;\">
                  ${SUMM}
                </p>
                <a href=\"${PAGE_URL}\"
                   style=\"display:inline-block;padding:9px 20px;font-size:13px;font-weight:600;
                           color:#2563EB;text-decoration:none;border:2px solid #2563EB;
                           border-radius:6px;\">
                  Read KB Article &rarr;
                </a>
              </div>"
            done
          fi

          ARTICLES_HTML+="
          <div style=\"margin:32px 0 36px;\">
            <table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\">
              <tr>
                <td style=\"border-radius:8px;
                            background:linear-gradient(135deg,#2563EB,#1D4ED8);\">
                  <a href=\"${WEBSITE_URL}\"
                     style=\"display:inline-block;padding:14px 32px;font-size:15px;
                             font-weight:600;color:#FFFFFF;text-decoration:none;\">
                    Visit the Knowledge Base &rarr;
                  </a>
                </td>
              </tr>
            </table>
          </div>"

          export WEEK_DATE WEBSITE_URL ARTICLES_HTML

          VARS='${WEEK_DATE} ${WEBSITE_URL} ${ARTICLES_HTML}'

          envsubst "$VARS" \
            < .github/scripts/notify-on-merge.html \
            > /tmp/email_body.html

          {
            echo "Alexandria – New Content Published"
            echo ""
            jq -r '.[] | "## \(.title)\n\(.summary)\n"' /tmp/summaries.json
            echo "Visit the knowledge base: ${WEBSITE_URL}"
            echo ""
            echo "${WEEK_DATE}"
          } > /tmp/email_plain.txt

      # ── 5. Send the email ──────────────────────────────────────────────────
      - name: Send notification email
        if: steps.changed.outputs.has_content == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          from:    "Alexandria – DE Knowledge Base <${{ secrets.MAIL_FROM }}>"
          to:      ${{ secrets.MAIL_TO }}
          subject: "📘 Alexandria – New Content Published | ${{ steps.render.outputs.week_date }}"
          html_body:  file:///tmp/email_body.html
          body:       file:///tmp/email_plain.txt
          ignore_cert: false
          convert_markdown: false
          priority: normal

      # ── 6. Update the tracking tag ─────────────────────────────────────────
      #
      #  Only runs after a successful email send.
      #  Moves "last-email-notification" to the current HEAD so next week's
      #  run knows exactly where to diff from.
      # ─────────────────────────────────────────────────────────────────────────
      - name: Update last-email-notification tag
        if: steps.changed.outputs.has_content == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-update the tag to current HEAD
          # git tag -f last-email-notification HEAD

          # Push the updated tag back to the repo
          # git push --force origin last-email-notification

          # echo "✅ Tag last-email-notification updated to $(git rev-parse HEAD)"
