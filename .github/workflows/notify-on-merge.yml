name: Notify on Content Published

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  notify:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Collect changed files & their content ───────────────────────────
      - name: Gather changed files
        id: changed
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}

          FILES=$(git diff --name-only --diff-filter=AM "$BASE" "$HEAD" \
                  | grep -E '\.(md|mdx|txt|rst)$' \
                  | head -20)

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES"     >> "$GITHUB_OUTPUT"
          echo "EOF"        >> "$GITHUB_OUTPUT"

          # Build a JSON array: [{file, content}, ...]
          # Each file gets up to 3 KB of content
          JSON_ARRAY="["
          FIRST=true
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            CONTENT=$(head -c 3000 "$f" | jq -Rs .)
            FILE_JSON=$(jq -n --arg f "$f" --argjson c "$CONTENT" '{file: $f, content: $c}')
            if [ "$FIRST" = true ]; then
              JSON_ARRAY+="$FILE_JSON"
              FIRST=false
            else
              JSON_ARRAY+=",$FILE_JSON"
            fi
          done <<< "$FILES"
          JSON_ARRAY+="]"

          echo "$JSON_ARRAY" > /tmp/pr_files.json

      # ── 3. Generate per-file title + summary via Gemini 2.5 Flash ────────────
      #
      #  Provider : Google AI Studio (free tier — no credit card required)
      #  Model    : gemini-2.5-flash  (free: ~10 RPM / 500 RPD)
      #  Secret   : GEMINI_API_KEY  ← add this in repo Settings → Secrets
      #
      #  How to get a free GEMINI_API_KEY (2 minutes):
      #    1. Go to https://aistudio.google.com/apikey
      #    2. Sign in with your Google account
      #    3. Click "Create API key" → copy the key (starts with AIza...)
      #    4. Add it as GEMINI_API_KEY in repo Settings → Secrets and variables → Actions
      #
      #  The LLM returns a JSON array — one object per file:
      #    [{ "file": "path/to/file.md",
      #       "title": "Human-readable article title",
      #       "summary": "2-3 sentence summary" }, ...]
      # ─────────────────────────────────────────────────────────────────────────
      - name: Generate per-file summaries via Gemini 2.5 Flash
        id: summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          WEBSITE_URL:    ${{ vars.WEBSITE_URL }}
        run: |
          FILES_JSON=$(cat /tmp/pr_files.json)

          # Gemini uses a single "text" field inside "parts" for the prompt.
          # We combine system instruction and user content into one message
          # since the generateContent endpoint handles it as a single turn.
          PROMPT=$(jq -n \
            --argjson files "$FILES_JSON" \
            --arg url "$WEBSITE_URL" \
            '"You are a technical writer for Alexandria, a data engineering knowledge base.\n\nFor each file below, extract the article title from the content (use the first H1 heading or the most prominent title — NOT the filename) and write a 2-3 sentence summary explaining what the article covers and why it is useful for data engineers.\n\nReturn ONLY a valid JSON array — no markdown, no code fences, no extra text:\n[\n  {\n    \"file\": \"<original file path>\",\n    \"title\": \"<article title from content>\",\n    \"summary\": \"<2-3 sentence summary>\"\n  }\n]\n\nFiles:\n" + ($files | tostring)')

          PAYLOAD=$(jq -n \
            --argjson prompt "$PROMPT" \
            '{
              contents: [{
                parts: [{ text: $prompt }]
              }],
              generationConfig: {
                temperature: 0.2,
                maxOutputTokens: 1024
              }
            }')

          RESPONSE=$(curl -s \
            -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Log the full API response for easier debugging in the Actions UI
          echo "=== Gemini API raw response ==="
          echo "$RESPONSE" | jq .
          echo "==============================="

          # Check for API-level errors first
          API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty')
          if [ -n "$API_ERROR" ]; then
            echo "ERROR: Gemini API returned an error: $API_ERROR"
            echo "[]" > /tmp/summaries.json
          else
            # Extract the text reply from the first candidate
            RAW=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "[]"')

            # Strip any accidental markdown code fences without collapsing lines
            CLEAN=$(echo "$RAW" \
              | sed 's/^```json[[:space:]]*//' \
              | sed 's/^```[[:space:]]*//' \
              | sed 's/[[:space:]]*```$//')

            # Validate it is parseable JSON; fall back to empty array if not
            if echo "$CLEAN" | jq . > /tmp/summaries.json 2>/dev/null; then
              echo "Successfully parsed $(jq 'length' /tmp/summaries.json) article(s)."
            else
              echo "WARNING: Model response was not valid JSON. Raw output:"
              echo "$CLEAN"
              echo "[]" > /tmp/summaries.json
            fi
          fi

      # ── 4. Build ARTICLES_HTML and render the email template ───────────────
      - name: Render email from template
        env:
          PR_TITLE:    ${{ github.event.pull_request.title }}
          PR_URL:      ${{ github.event.pull_request.html_url }}
          MERGED_AT:   ${{ github.event.pull_request.merged_at }}
          WEBSITE_URL: ${{ vars.WEBSITE_URL }}
          REPO_NAME:   ${{ github.repository }}
        run: |
          MERGED_DATE=$(date -d "$MERGED_AT" "+%B %d, %Y at %H:%M UTC" 2>/dev/null \
                        || echo "$MERGED_AT")
          CURRENT_YEAR=$(date +%Y)

          # ── Derive a page URL from a file path ──────────────────────────
          # Converts  "content/pipelines/kafka-intro.md"
          #       →   "https://yoursite.com/pipelines/kafka-intro"
          #
          # Rules applied in order:
          #   1. Strip a leading content/ or docs/ directory if present
          #   2. Strip the file extension
          #   3. Prepend WEBSITE_URL (trailing slash normalised)
          # Adjust the sed expression below if your site uses a different structure.
          # Converts "content/pipelines/kafka-intro.md"
          #       →  "https://yoursite.com/pipelines/kafka-intro"
          # Strips a leading content/ or docs/ directory, then the file extension.
          # Adjust the first sed expression if your repo uses a different root folder.
          derive_url() {
            local filepath="$1"
            local base_url="${WEBSITE_URL%/}"
            local page
            page=$(echo "$filepath" \
              | sed 's|^content/||; s|^docs/||' \
              | sed 's|\.[^.]*$||')
            echo "${base_url}/${page}"
          }

          # ── Build one HTML block per article ────────────────────────────
          ARTICLES_HTML=""
          COUNT=$(jq 'length' /tmp/summaries.json)

          if [ "$COUNT" -eq 0 ]; then
            # Graceful fallback — no per-file data available
            ARTICLES_HTML='<p style="font-size:15px;line-height:1.75;color:#374151;">
              New content has been published to the knowledge base.
              Visit the website to see what is new.
            </p>'
          else
            for i in $(seq 0 $(( COUNT - 1 )) ); do
              FILE=$(jq -r ".[$i].file"    /tmp/summaries.json)
              TITLE=$(jq -r ".[$i].title"  /tmp/summaries.json)
              SUMM=$(jq -r  ".[$i].summary" /tmp/summaries.json)
              PAGE_URL=$(derive_url "$FILE")

              # Add a divider between articles (not before the first one)
              if [ "$i" -gt 0 ]; then
                ARTICLES_HTML+='<hr style="border:none;border-top:1px solid #E5E7EB;margin:0 0 24px;"/>'
              fi

              ARTICLES_HTML+="
              <div style=\"margin-bottom:28px;\">
                <h3 style=\"margin:0 0 10px;font-size:17px;font-weight:700;color:#1E3A5F;
                            line-height:1.4;\">
                  ${TITLE}
                </h3>
                <p style=\"margin:0 0 14px;font-size:15px;line-height:1.75;color:#374151;\">
                  ${SUMM}
                </p>
                <a href=\"${PAGE_URL}\"
                   style=\"display:inline-block;padding:9px 20px;font-size:13px;font-weight:600;
                           color:#2563EB;text-decoration:none;border:2px solid #2563EB;
                           border-radius:6px;\">
                  Read Article &rarr;
                </a>
              </div>"
            done
          fi

          # Append the main CTA button after all articles
          ARTICLES_HTML+="
          <div style=\"margin:32px 0 36px;\">
            <table role=\"presentation\" cellpadding=\"0\" cellspacing=\"0\">
              <tr>
                <td style=\"border-radius:8px;
                            background:linear-gradient(135deg,#2563EB,#1D4ED8);\">
                  <a href=\"${WEBSITE_URL}\"
                     style=\"display:inline-block;padding:14px 32px;font-size:15px;
                             font-weight:600;color:#FFFFFF;text-decoration:none;\">
                    Visit the Knowledge Base &rarr;
                  </a>
                </td>
              </tr>
            </table>
          </div>"

          # Export vars for envsubst
          export MERGED_DATE WEBSITE_URL ARTICLES_HTML \
                 REPO_NAME CURRENT_YEAR

          VARS='${MERGED_DATE} ${WEBSITE_URL} ${ARTICLES_HTML}
                ${REPO_NAME} ${CURRENT_YEAR}'

          envsubst "$VARS" \
            < .github/scripts/notify-on-merge.html \
            > /tmp/email_body.html

          # Plain-text fallback
          {
            echo "New Content Published – ${PR_TITLE}"
            echo ""
            jq -r '.[] | "## \(.title)\n\(.summary)\n"' /tmp/summaries.json
            echo "Visit the knowledge base: ${WEBSITE_URL}"
            echo ""
            echo "Published on ${MERGED_DATE}"
          } > /tmp/email_plain.txt

      # ── 5. Send the email ──────────────────────────────────────────────────
      - name: Send notification email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port:    ${{ secrets.SMTP_PORT }}
          username:       ${{ secrets.SMTP_USERNAME }}
          password:       ${{ secrets.SMTP_PASSWORD }}
          from:    "Alexandria – DE Knowledge Base <${{ secrets.MAIL_FROM }}>"
          to:      ${{ secrets.MAIL_TO }}
          subject: "📘 Alexandria – New Content Published on the Knowledge Base"
          html_body:  file:///tmp/email_body.html
          body:       file:///tmp/email_plain.txt
          ignore_cert: false
          convert_markdown: false
          priority: normal